name: Build and deploy

on:
  push:
    branches:
      - main
    paths:
      - "plugins/**"
      - "build.mjs"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Build plugin(s)
        run: npm run build

      - name: Copy additional files
        run: |
          cp README.md dist/README.md
          cat > dist/404.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Revenge Plugin Link</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; line-height: 1.5; }
              code { background: #f3f3f3; padding: 0.1rem 0.25rem; border-radius: 4px; }
            </style>
          </head>
          <body>
            <p><strong>Note:</strong> You opened a plugin install URL directly. Copy the URL and add it in Revenge instead of opening it in a browser.</p>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          enable_jekyll: false
